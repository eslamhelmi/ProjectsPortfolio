    <path d="M 0 320 Q 150 300 300 280 T 600 240 T 900 200 T 1200 160"/>
    <path d="M 0 340 Q 200 320 400 300 T 800 260 T 1200 220"/>
  </g>
  
  <!-- Chart bars decoration -->
